                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col">
                                <button class="btn btn-primary btn-block" id="nuevo">Nuevo</button>
                            </div>
                            <div class="col">
                                <button class="btn btn-primary btn-block" id="modificar">Modificar</button>
                            </div>
                            <div class="col">
                                <button class="btn btn-primary btn-block" id="eliminar">Eliminar</button>

                        <input type="search" class="form-control my-3" id="buscar" placeholder="Buscar...">
                        <div class="border" style="height: 400px; overflow-y: auto; overflow-x: hidden;">
                            <table class="table table-sm">

                    <div class="card-header font-weight-bold bg-light">
                        Datos <span class="badge badge-info" id="accion"></span>
                    </div>
                    <div class="card-body" id="datos">
                        <div class="form-group">
                            <label for="">Nombre</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>
                        <div class="form-group">
                            <label for="">Email</label>
                            <input type="text" class="form-control" id="email">
                        </div>
                        <div class="form-group">
                            <label for="">Contraseña</label>
                            <input type="password" class="form-control" id="contrasena">
                        </div>
                        <div class="form-group">
                            <label for="">Dirección</label>
                            <input type="text" class="form-control" id="direccion">
                        </div>
                        <div class="form-group">
                            <label for="">Teléfono</label>
                            <input type="text" class="form-control" id="telefono">
                        </div>
                        <div class="form-group">
                            <label for="">DNI</label>
                            <input type="text" class="form-control" id="dni">
                        </div>
                        <div class="form-group">
                            <label for="">EnrollNumber</label>
                            <input type="text" class="form-control" id="enrollNumber">
                        </div>
                        <div class="form-group">
                            <label for="">Es administrador</label>
                            <select class="form-control" id="esAdmin">
                                <option value="0">No</option>
                                <option value="1">Si</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="">Es profesor</label>
                            <select class="form-control" id="esProfe">
                                <option value="0">No</option>
                                <option value="1">Si</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="">Pase libre</label>
                            <select class="form-control" id="paseLibre">
                                <option value="0">No</option>
                                <option value="1">Si</option>
                            </select>
                        </div>
                        <div class="text-right">
                            <button class="btn btn-primary" id="guardar">Guardar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
