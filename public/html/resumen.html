    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header font-weight-bold bg-light">
                        Resumen
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-3">
                                <input type="month" class="form-control" id="mes">
                            </div>
                            <div class="col d-none">
                                <select name="caja" class="form-control d-none" id="caja">
                                    <option value="todas">Caja: Todas</option>
                                </select>
                            </div>
                            <div class="col d-none">
                                <select name="filtro" class="form-control d-none" id="filtro">
                                    <option value="ninguno">Filtro: ninguno</option>
                                    <option value="cobros">Filtro: solo cobros</option>
                                    <option value="pagos">Filtro: solo pagos</option>
                                </select>
                            </div>
                            <div class="col-9 text-right">
                                <button class="btn btn-primary" id="agregar-registro"><i class="fas fa-plus"></i> Agregar registro</button>

                            </div>
                        </div>
                        <div class="border" style="height: 400px; overflow-y: auto; overflow-x: hidden;">
                            <table class="table table-sm">
                                <thead class="thead-dark">
                                    <tr>
                                        <th>Acción</th>
                                        <th>Fecha</th>
                                        <th>Cliente</th>
                                        <th class="text-right">Monto</th>
                                        <th class="text-right">Saldo (mes)</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="border mt-3" style="height: 400px; overflow-y: auto; overflow-x: hidden;">
                            <table class="table table-sm">
                                <thead class="thead-dark">
                                    <tr>
                                        <th>Disciplina</th>
                                        <th class="text-right">Registros</th>
                                        <th class="text-right">Ingresos</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modales" class="d-none">
        <div id="modal-agregar-registro">
            <div class="form-group">
                <label for="">Fecha</label>
                <input type="text" readonly id="fecha" class="form-control">
            </div>
            <div class="form-group">
                <label for="">Acción</label>
                <select name="accion" id="accion" class="form-control">
                    <option value="cobro">Cobro</option>
                    <option value="pago">Pago</option>
                </select>
            </div>
            <div class="form-group">
                <label for="">Caja / Método de Pago</label>
                <select name="caja" id="caja" class="form-control">
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                </select>
            </div>
            <div class="form-group">
                <label for="">Monto</label>
                <input type="number" id="monto" class="form-control">
            </div>
            <div class="form-group">
                <label for="">Detalle</label>
                <input type="text" id="detalle" class="form-control">
            </div>

            <div class="text-center">
                <button class="btn btn-success" id="acreditar">Acreditar</button>
            </div>

        </div>
    </div>
